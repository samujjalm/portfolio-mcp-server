services:
  postgres:
    image: 'postgres:17'
    container_name: 'java-net-postgres'
    environment:
      - 'POSTGRES_DB=mydatabase'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      # Fixed host port for predictable local access (psql, MCP inspector, etc.).
      # Spring Boot's docker-compose support still auto-derives the datasource either way.
      - '5432:5432'
    volumes:
      - 'java-net-pgdata:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U myuser -d mydatabase']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  java-net-pgdata:

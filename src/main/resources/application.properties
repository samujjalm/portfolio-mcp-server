spring.application.name=java-net

# Non-default port to avoid clashing with other MCP servers (8080 is commonly taken).
server.port=8089

# --- MCP server (Spring AI, webmvc/SSE transport) ---
spring.ai.mcp.server.name=portfolio-mcp
spring.ai.mcp.server.version=0.0.1
spring.ai.mcp.server.type=SYNC
# SSE endpoint defaults to /sse and the message endpoint to /mcp/message.
